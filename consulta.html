<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta - Klord Buscas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --cor-fundo: #0a0a0f;
            --cor-card: #12121a;
            --cor-card-sec: #1a1a25;
            --cor-borda: #2a2a3e;
            --cor-primaria: #7f00ff;
            --cor-secundaria: #a855f7;
            --cor-acento: #00d4ff;
            --cor-sucesso: #10b981;
            --cor-erro: #ef4444;
            --cor-texto: #f8fafc;
            --cor-texto-sec: #94a3b8;
            --gradient-primario: linear-gradient(135deg, #7f00ff 0%, #a855f7 100%);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--cor-fundo);
            color: var(--cor-texto);
            min-height: 100vh;
        }

        .header {
            background: rgba(18, 18, 26, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--cor-borda);
            padding: 1rem 2rem;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--cor-texto-sec);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        .back-btn:hover { color: var(--cor-primaria); }

        .module-info { text-align: right; }
        .module-info h1 { font-size: 1.25rem; font-weight: 700; color: var(--cor-texto); }
        .module-info span { font-size: 0.85rem; color: var(--cor-texto-sec); }

        .main-content { padding: 100px 2rem 2rem; max-width: 1200px; margin: 0 auto; }

        .input-section {
            background: var(--cor-card);
            border: 1px solid var(--cor-borda);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .input-group { display: flex; gap: 1rem; margin-bottom: 1rem; }

        .input-wrapper { flex: 1; position: relative; }

        .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--cor-texto-sec);
        }

        #dadoConsulta {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            background: var(--cor-card-sec);
            border: 1px solid var(--cor-borda);
            border-radius: 12px;
            color: var(--cor-texto);
            font-size: 1rem;
            transition: all 0.3s;
        }

        #dadoConsulta:focus {
            outline: none;
            border-color: var(--cor-primaria);
            box-shadow: 0 0 0 3px rgba(127, 0, 255, 0.1);
        }

        .btn-consultar {
            padding: 1rem 2rem;
            background: var(--gradient-primario);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-consultar:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(127, 0, 255, 0.4);
        }

        .btn-consultar:disabled { opacity: 0.6; cursor: not-allowed; }

        .actions-row { display: flex; gap: 1rem; justify-content: space-between; align-items: center; }
        .actions-left { display: flex; gap: 1rem; }

        .btn-secundario {
            padding: 0.75rem 1.5rem;
            background: transparent;
            border: 1px solid var(--cor-borda);
            border-radius: 8px;
            color: var(--cor-texto-sec);
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
        }

        .btn-secundario:hover { border-color: var(--cor-primaria); color: var(--cor-primaria); }

        .status-message {
            padding: 1rem 1.5rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            display: none;
            align-items: center;
            gap: 12px;
            font-weight: 500;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .status-success { background: rgba(16, 185, 129, 0.1); border: 1px solid var(--cor-sucesso); color: var(--cor-sucesso); }
        .status-error { background: rgba(239, 68, 68, 0.1); border: 1px solid var(--cor-erro); color: var(--cor-erro); }
        .status-loading { background: rgba(127, 0, 255, 0.1); border: 1px solid var(--cor-primaria); color: var(--cor-primaria); }

        .loading-container {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--cor-texto-sec);
            display: none;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 3px solid var(--cor-borda);
            border-top-color: var(--cor-primaria);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1.5rem;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .results-container {
            background: var(--cor-card);
            border: 1px solid var(--cor-borda);
            border-radius: 16px;
            overflow: hidden;
            display: none;
        }

        .results-header {
            background: var(--cor-card-sec);
            padding: 1.5rem;
            border-bottom: 1px solid var(--cor-borda);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .results-header h2 { font-size: 1.25rem; display: flex; align-items: center; gap: 10px; }
        .results-header h2 i { color: var(--cor-primaria); }
        .results-body { padding: 1.5rem; }

        .data-section { margin-bottom: 2rem; }

        .section-title {
            font-size: 0.875rem;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--cor-primaria);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .data-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1rem; }

        .data-field {
            background: var(--cor-card-sec);
            padding: 1rem;
            border-radius: 10px;
            border: 1px solid var(--cor-borda);
        }

        .data-field .label { font-size: 0.75rem; color: var(--cor-texto-sec); text-transform: uppercase; margin-bottom: 0.25rem; }
        .data-field .value { font-size: 1rem; font-weight: 600; color: var(--cor-texto); word-break: break-word; }
        .data-field .value.empty { color: var(--cor-erro); font-style: italic; }

        .data-table { width: 100%; border-collapse: collapse; margin-top: 1rem; }

        .data-table th {
            text-align: left;
            padding: 1rem;
            background: var(--cor-card-sec);
            color: var(--cor-texto-sec);
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 600;
        }

        .data-table td { padding: 1rem; border-bottom: 1px solid var(--cor-borda); color: var(--cor-texto); }
        .data-table tr:hover { background: rgba(127, 0, 255, 0.05); }

        .tag {
            display: inline-flex;
            align-items: center;
            padding: 0.5rem 1rem;
            border-radius: 50px;
            font-size: 0.875rem;
            font-weight: 600;
            margin: 0.25rem;
        }

        .tag-restricao { background: rgba(239, 68, 68, 0.1); color: var(--cor-erro); border: 1px solid var(--cor-erro); }
        .tag-success { background: rgba(16, 185, 129, 0.1); color: var(--cor-sucesso); border: 1px solid var(--cor-sucesso); }
        .tag-info { background: rgba(0, 212, 255, 0.1); color: var(--cor-acento); border: 1px solid var(--cor-acento); }

        .photo-container { text-align: center; padding: 2rem; }
        .photo-container img { max-width: 100%; max-height: 400px; border-radius: 12px; border: 3px solid var(--cor-primaria); box-shadow: var(--shadow); }

        .json-view { background: var(--cor-card-sec); padding: 1.5rem; border-radius: 10px; overflow-x: auto; }
        .json-view pre { margin: 0; color: var(--cor-texto-sec); font-family: 'Fira Code', monospace; font-size: 0.875rem; line-height: 1.6; }

        .empty-state { text-align: center; padding: 4rem 2rem; color: var(--cor-texto-sec); }
        .empty-state i { font-size: 4rem; margin-bottom: 1rem; opacity: 0.3; }

        .export-buttons { display: flex; gap: 0.5rem; }

        .btn-icon {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            border: 1px solid var(--cor-borda);
            background: transparent;
            color: var(--cor-texto-sec);
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-icon:hover { border-color: var(--cor-primaria); color: var(--cor-primaria); }

        .btn-history {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--gradient-primario);
            color: white;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(127, 0, 255, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            transition: all 0.3s;
            z-index: 100;
        }

        .btn-history:hover { transform: scale(1.1); }

        .history-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            width: 24px;
            height: 24px;
            background: var(--cor-erro);
            border-radius: 50%;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .history-sidebar {
            position: fixed;
            right: -400px;
            top: 0;
            width: 400px;
            height: 100vh;
            background: var(--cor-card);
            border-left: 1px solid var(--cor-borda);
            z-index: 2000;
            transition: right 0.3s;
            overflow-y: auto;
        }

        .history-sidebar.open { right: 0; }

        .history-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--cor-borda);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-header h3 { display: flex; align-items: center; gap: 10px; }

        .btn-close-history {
            background: none;
            border: none;
            color: var(--cor-texto-sec);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .history-item {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--cor-borda);
            cursor: pointer;
            transition: background 0.2s;
        }

        .history-item:hover { background: var(--cor-card-sec); }
        .history-item .time { font-size: 0.75rem; color: var(--cor-texto-sec); }
        .history-item .query { font-weight: 600; color: var(--cor-texto); margin-top: 0.25rem; }
        .history-item .module { font-size: 0.8rem; color: var(--cor-primaria); margin-top: 0.25rem; }

        .overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.5); z-index: 1500; display: none; }
        .overlay.show { display: block; }

        .quick-actions { display: flex; gap: 0.5rem; margin-top: 1rem; flex-wrap: wrap; }

        .quick-tag {
            padding: 0.5rem 1rem;
            background: var(--cor-card-sec);
            border: 1px solid var(--cor-borda);
            border-radius: 50px;
            font-size: 0.85rem;
            color: var(--cor-texto-sec);
            cursor: pointer;
            transition: all 0.2s;
        }

        .quick-tag:hover { border-color: var(--cor-primaria); color: var(--cor-primaria); }

        @media (max-width: 768px) {
            .input-group { flex-direction: column; }
            .actions-row { flex-direction: column; align-items: stretch; }
            .actions-left { justify-content: center; }
            .header-content { flex-wrap: wrap; gap: 1rem; }
            .history-sidebar { width: 100%; right: -100%; }
            .export-buttons { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <a href="/painel" class="back-btn">
                <i class="fas fa-arrow-left"></i>
                <span>Voltar ao Painel</span>
            </a>
            <div class="module-info">
                <h1 id="moduleTitle">Carregando...</h1>
                <span id="moduleVersion">Selecione um módulo</span>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="input-section">
            <div class="input-group">
                <div class="input-wrapper">
                    <i class="fas fa-search input-icon"></i>
                    <input type="text" id="dadoConsulta" placeholder="Digite o dado para consulta..." onkeypress="if(event.key === 'Enter') fazerConsulta()">
                </div>
                <button class="btn-consultar" id="btnConsultar" onclick="fazerConsulta()">
                    <i class="fas fa-bolt"></i>
                    <span>Consultar</span>
                </button>
            </div>
            
            <div class="quick-actions" id="quickActions"></div>

            <div class="actions-row">
                <div class="actions-left">
                    <button class="btn-secundario" onclick="limparConsulta()">
                        <i class="fas fa-eraser"></i>
                        Limpar
                    </button>
                    <button class="btn-secundario" onclick="toggleHistory()">
                        <i class="fas fa-history"></i>
                        Histórico
                    </button>
                </div>
                <div class="export-buttons">
                    <button class="btn-icon" onclick="copiarResultado()" title="Copiar"><i class="fas fa-copy"></i></button>
                    <button class="btn-icon" onclick="exportarJSON()" title="Exportar JSON"><i class="fas fa-file-code"></i></button>
                    <button class="btn-icon" onclick="exportarCSV()" title="Exportar CSV"><i class="fas fa-file-csv"></i></button>
                </div>
            </div>
        </div>

        <div id="statusMessage" class="status-message"></div>

        <div class="loading-container" id="loadingContainer">
            <div class="spinner"></div>
            <p>Consultando API...</p>
            <p style="font-size: 0.85rem; margin-top: 0.5rem;">Isso pode levar até 60 segundos</p>
        </div>

        <div class="results-container" id="resultsContainer">
            <div class="results-header">
                <h2><i class="fas fa-check-circle"></i> Resultado da Consulta</h2>
                <span id="resultTimestamp"></span>
            </div>
            <div class="results-body" id="resultsBody"></div>
        </div>

        <div class="empty-state" id="emptyState">
            <i class="fas fa-search"></i>
            <h3>Pronto para consultar</h3>
            <p>Digite um dado válido e clique em "Consultar" para iniciar</p>
        </div>
    </main>

    <button class="btn-history" onclick="toggleHistory()">
        <i class="fas fa-history"></i>
        <span class="history-badge" id="historyCount">0</span>
    </button>

    <div class="overlay" id="overlay" onclick="toggleHistory()"></div>

    <div class="history-sidebar" id="historySidebar">
        <div class="history-header">
            <h3><i class="fas fa-history"></i> Histórico</h3>
            <button class="btn-close-history" onclick="toggleHistory()"><i class="fas fa-times"></i></button>
        </div>
        <div id="historyList"></div>
    </div>

    <script>
        const API_MAP = {
            'cnpj': { title: 'Consulta CNPJ', endpoint: '/api/consulta-cnpj', placeholder: '00.000.000/0000-00', version: 'V1', category: 'empresas' },
            'cpf': { title: 'Consulta CPF', endpoint: '/api/consulta-cpf', placeholder: '000.000.000-00', version: 'V1', category: 'pessoas' },
            'rg': { title: 'Consulta RG', endpoint: '/api/consulta-rg', placeholder: '00000000', version: 'V1', category: 'pessoas' },
            'nome': { title: 'Busca por Nome', endpoint: '/api/consulta-nome', placeholder: 'NOME COMPLETO', version: 'V1', category: 'pessoas' },
            'telefone': { title: 'Consulta Telefone', endpoint: '/api/consulta-telefone', placeholder: '11999999999', version: 'V1', category: 'pessoas' },
            'placa': { title: 'Consulta Placa', endpoint: '/api/consulta-placa', placeholder: 'ABC1234', version: 'V1', category: 'veiculos' },
            'renavam': { title: 'Consulta RENAVAM', endpoint: '/api/consulta-renavam', placeholder: '00000000000', version: 'V1', category: 'veiculos' },
            'foto-sp': { title: 'Foto SP', endpoint: '/api/consulta-foto-sp', placeholder: '00000000000', version: 'V1', category: 'imagens' },
            'foto-rj': { title: 'Foto RJ', endpoint: '/api/consulta-foto-rj', placeholder: '00000000000', version: 'V1', category: 'imagens' },
            'foto-es': { title: 'Foto ES', endpoint: '/api/consulta-foto-es', placeholder: '00000000000', version: 'V1', category: 'imagens' },
            
            'cpf-v1': { title: 'Consulta CPF V1 (V2)', endpoint: '/api/consulta-cpf-v1', placeholder: '000.000.000-00', version: 'V2', category: 'pessoas' },
            'cpf-v2': { title: 'Consulta CPF V2', endpoint: '/api/consulta-cpf-v2', placeholder: '000.000.000-00', version: 'V2', category: 'pessoas' },
            'cpf-v3': { title: 'Consulta CPF V3 + Foto', endpoint: '/api/consulta-cpf-v3', placeholder: '000.000.000-00', version: 'V2', category: 'pessoas' },
            'cpf-v4': { title: 'Consulta CPF V4', endpoint: '/api/consulta-cpf-v4', placeholder: '000.000.000-00', version: 'V2', category: 'pessoas' },
            'cpf-v5': { title: 'Consulta CPF V5', endpoint: '/api/consulta-cpf-v5', placeholder: '000.000.000-00', version: 'V2', category: 'pessoas' },
            'fotope': { title: 'Foto por Nome', endpoint: '/api/consulta-fotope', placeholder: 'NOME COMPLETO', version: 'V2', category: 'imagens' },
            'nome-v2': { title: 'Busca por Nome V2', endpoint: '/api/consulta-nome-v2', placeholder: 'NOME COMPLETO', version: 'V2', category: 'pessoas' },
            'placa-v1': { title: 'Consulta Placa V1 (V2)', endpoint: '/api/consulta-placa-v1', placeholder: 'ABC1234', version: 'V2', category: 'veiculos' },
            'placa-v2': { title: 'Consulta Placa V2', endpoint: '/api/consulta-placa-v2', placeholder: 'ABC1234', version: 'V2', category: 'veiculos' },
            'telefone-v2': { title: 'Consulta Telefone V2', endpoint: '/api/consulta-telefone-v2', placeholder: '11999999999', version: 'V2', category: 'pessoas' },
            'cep': { title: 'Consulta CEP', endpoint: '/api/consulta-cep', placeholder: '00000-000', version: 'V2', category: 'pessoas' },
            'cnpj-v2': { title: 'Consulta CNPJ V2', endpoint: '/api/consulta-cnpj-v2', placeholder: '00.000.000/0000-00', version: 'V2', category: 'empresas' },
            'motor': { title: 'Consulta Motor', endpoint: '/api/consulta-motor', placeholder: 'NÚMERO DO MOTOR', version: 'V2', category: 'veiculos' },
            'chassi': { title: 'Consulta Chassi', endpoint: '/api/consulta-chassi', placeholder: '00000000000000000', version: 'V2', category: 'veiculos' },
            
            'cpf2': { title: 'Consulta CPF (Base 2)', endpoint: '/api/consulta-cpf2', placeholder: '000.000.000-00', version: 'V2', category: 'pessoas' }
        };

        let currentModule = '';
        let currentData = null;
        let consultHistory = JSON.parse(localStorage.getItem('klord_history') || '[]');
        const internalToken = "KLORD-TESTE-1234567890ABCDEF";

        window.onload = function() {
            currentModule = getQueryParam('modulo');
            
            if (!currentModule || !API_MAP[currentModule]) {
                if (currentModule && currentModule.includes('_')) {
                    const corrected = currentModule.replace(/_/g, '-');
                    if (API_MAP[corrected]) currentModule = corrected;
                }
            }

            if (currentModule && API_MAP[currentModule]) {
                const config = API_MAP[currentModule];
                document.getElementById('moduleTitle').textContent = config.title;
                document.getElementById('moduleVersion').textContent = `API ${config.version} • ${config.category}`;
                document.getElementById('dadoConsulta').placeholder = config.placeholder;
                document.title = `${config.title} - Klord Buscas`;
                fillQuickActions(config.category);
            } else {
                document.getElementById('moduleTitle').textContent = 'Módulo não encontrado';
                document.getElementById('moduleVersion').textContent = 'Verifique a URL';
            }

            updateHistoryCount();
        };

        function getQueryParam(name) { return new URLSearchParams(window.location.search).get(name); }

        function fillQuickActions(category) {
            const container = document.getElementById('quickActions');
            const examples = {
                'pessoas': ['058.898.133-82', 'WAGNER MOREIRA', '11998005612'],
                'veiculos': ['DEO8922', '00765289172', '9BWZZZ30ZPP227569'],
                'empresas': ['05456283000102', '00910509000171'],
                'imagens': ['00466299800', '12122628758']
            };
            
            const items = examples[category] || [];
            container.innerHTML = items.map(ex => `<span class="quick-tag" onclick="setInput('${ex}')">${ex}</span>`).join('');
        }

        function setInput(value) { document.getElementById('dadoConsulta').value = value; }

        async function fazerConsulta() {
            const config = API_MAP[currentModule];
            if (!config) { showStatus('Módulo não configurado', 'error'); return; }

            const dado = document.getElementById('dadoConsulta').value.trim();
            if (!dado) { showStatus('Digite um dado para consultar', 'error'); return; }

            const btn = document.getElementById('btnConsultar');
            btn.disabled = true;
            
            showLoading(true);
            hideResults();
            showStatus('Consultando API...', 'loading');

            try {
                const url = `${config.endpoint}?dado=${encodeURIComponent(dado)}&token=${internalToken}`;
                const response = await fetch(url);
                let data = await response.json();

                if (data._creditos || data._info || data._contato) {
                    delete data._creditos;
                    delete data._info;
                    delete data._contato;
                }

                currentData = data;

                if (!response.ok || data.erro || data.status === 'erro' || (data.resultado && data.resultado.status === 'false')) {
                    const errorMsg = data.erro || data.mensagem || data.status || 'Erro na consulta';
                    showStatus(`Erro: ${errorMsg}`, 'error');
                    showRawResult(data);
                } else {
                    showStatus('Consulta realizada com sucesso!', 'success');
                    renderResult(data);
                    addToHistory(dado, config.title);
                }

            } catch (error) {
                showStatus(`Erro de conexão: ${error.message}`, 'error');
                console.error(error);
            } finally {
                btn.disabled = false;
                showLoading(false);
            }
        }

                    <table class="data-table">
                        <thead><tr><th>Nome</th><th>CPF</th><th>Nascimento</th></tr></thead>
                        <tbody>${pessoas.map(p => `<tr><td>${p.nome_completo || p.nome}</td><td>${p.cpf}</td><td>${p.data_nascimento || p.nascimento || 'N/A'}</td></tr>`).join('')}</tbody>
                    </table>
                </div>`;
            }

            return html;
        }

        function renderNomeV2(data) {
            const r = data.resultado?.resultado || data;
            const resultados = r.resultados || r;
            let html = '';

            html += renderSection('Consulta', [
                ['Nome', r.nome_consultado || 'N/A'],
                ['Total Encontrado', r.total_encontrado || resultados.length]
            ]);

            if (resultados.length > 0) {
                html += `<div class="data-section">
                    <div class="section-title"><i class="fas fa-users"></i> Pessoas Encontradas (${resultados.length})</div>
                    <table class="data-table">
                        <thead><tr><th>Nome</th><th>CPF</th><th>Sexo</th><th>Nascimento</th></tr></thead>
                        <tbody>${resultados.slice(0, 50).map(p => `<tr><td>${p.nome}</td><td>${p.cpf}</td><td>${p.sexo || 'N/A'}</td><td>${p.nascimento || 'N/A'}</td></tr>`).join('')}</tbody>
                    </table>
                </div>`;
            }

            return html;
        }

        function renderCEP(data) {
            const r = data.resultado?.resultado || data;
            const moradores = r.moradores || [];
            let html = '';

            html += renderSection('CEP', [
                ['CEP Consultado', r.cep_consultado],
                ['Quantidade Encontrada', r.quantidade_encontrada]
            ]);

            if (moradores.length > 0) {
                html += `<div class="data-section">
                    <div class="section-title"><i class="fas fa-users"></i> Moradores (${moradores.length})</div>
                    <table class="data-table">
                        <thead><tr><th>Nome</th><th>CPF</th><th>Nascimento</th><th>Renda</th><th>Bairro</th><th>Cidade</th><th>UF</th></tr></thead>
                        <tbody>${moradores.slice(0, 50).map(m => `<tr><td>${m.nome}</td><td>${m.cpf}</td><td>${m.nascimento}</td><td>${m.renda}</td><td>${m.bairro}</td><td>${m.cidade}</td><td>${m.uf}</td></tr>`).join('')}</tbody>
                    </table>
                </div>`;
            }

            return html;
        }

        function renderChassiMotor(data) {
            const r = data.resultado?.resultado || data;
            const bases = r.bases || {};
            let html = '';

            html += renderSection('Consulta', [
                ['Tipo', r.tipo_consulta],
                ['Valor Consultado', r.valor_consultado]
            ]);

            const baseKeys = Object.keys(bases);
            baseKeys.forEach(key => {
                const bd = bases[key];
                html += `<div class="data-section">
                    <div class="section-title"><i class="fas fa-database"></i> ${key}</div>
                    <div class="data-grid">${Object.entries(bd).map(([k, v]) => `<div class="data-field"><div class="label">${k}</div><div class="value">${v || 'N/A'}</div></div>`).join('')}</div>
                </div>`;
            });

            return html;
        }

        function renderFoto(data) {
            const keys = ['base64_image', 'base64_img', 'foto_base64', 'foto', 'imagem'];
            let img = null;
            let consulta = 'N/A';
            
            for (const key of keys) {
                if (data[key]) {
                    img = data[key];
                    break;
                }
            }
            
            if (!img && data.resultado?.resultado) {
                const rr = data.resultado.resultado;
                for (const key of keys) {
                    if (rr[key]) {
                        img = rr[key];
                        break;
                    }
                }
            }

            if (data.cpf_consultado) consulta = data.cpf_consultado;
            else if (data.consulta) consulta = data.consulta;

            if (!img) return '<div class="photo-container"><p>Imagem não encontrada</p></div>';
            
            const cleanBase64 = img.replace(/[\s\n\r]/g, '');
            return `
                <div class="photo-container">
                    <img src="data:image/jpeg;base64,${cleanBase64}" alt="Foto consultada">
                    <p style="margin-top: 1rem; color: var(--cor-texto-sec);">CPF/RG: ${consulta}</p>
                </div>
            `;
        }

        function renderRG(data) { return renderCPFV2(data); }

        function renderGeneric(data) {
            return `<div class="json-view"><pre>${JSON.stringify(data, null, 2)}</pre></div>`;
        }

        function showRawResult(data) {
            document.getElementById('resultsBody').innerHTML = renderGeneric(data);
            showResults();
        }

        function showStatus(msg, type) {
            const el = document.getElementById('statusMessage');
            el.textContent = msg;
            el.className = `status-message status-${type}`;
            el.style.display = 'flex';
            
            if (type !== 'loading') {
                setTimeout(() => { el.style.display = 'none'; }, 5000);
            }
        }

        function showLoading(show) { document.getElementById('loadingContainer').style.display = show ? 'block' : 'none'; }
        function showResults() {
            document.getElementById('resultsContainer').style.display = 'block';
            document.getElementById('emptyState').style.display = 'none';
        }
        function hideResults() {
            document.getElementById('resultsContainer').style.display = 'none';
            document.getElementById('statusMessage').style.display = 'none';
        }

        function limparConsulta() {
            document.getElementById('dadoConsulta').value = '';
            hideResults();
            document.getElementById('emptyState').style.display = 'block';
            currentData = null;
        }

        function copiarResultado() {
            if (!currentData) return;
            const text = JSON.stringify(currentData, null, 2);
            navigator.clipboard.writeText(text).then(() => { showStatus('Resultado copiado!', 'success'); });
        }

        function exportarJSON() {
            if (!currentData) return;
            const blob = new Blob([JSON.stringify(currentData, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `consulta_${currentModule}_${Date.now()}.json`;
            a.click();
        }

        function exportarCSV() {
            if (!currentData) return;
            const d = currentData.dados || currentData.resultado?.resultado || currentData;
            let csv = 'Campo,Valor\n';
            Object.entries(d).forEach(([k, v]) => {
                if (typeof v !== 'object') { csv += `"${k}","${v}"\n`; }
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `consulta_${currentModule}_${Date.now()}.csv`;
            a.click();
        }

        function addToHistory(query, module) {
            const item = { query, module, timestamp: new Date().toISOString(), url: window.location.href };
            consultHistory.unshift(item);
            if (consultHistory.length > 50) consultHistory.pop();
            localStorage.setItem('klord_history', JSON.stringify(consultHistory));
            updateHistoryCount();
            renderHistory();
        }

        function updateHistoryCount() { document.getElementById('historyCount').textContent = consultHistory.length; }

        function renderHistory() {
            const container = document.getElementById('historyList');
            if (consultHistory.length === 0) {
                container.innerHTML = '<div style="padding: 2rem; text-align: center; color: var(--cor-texto-sec);">Nenhuma consulta no histórico</div>';
                return;
            }
            container.innerHTML = consultHistory.map((h, i) => `
                <div class="history-item" onclick="loadFromHistory(${i})">
                    <div class="time">${new Date(h.timestamp).toLocaleString('pt-BR')}</div>
                    <div class="query">${h.query}</div>
                    <div class="module">${h.module}</div>
                </div>
            `).join('');
        }

        function loadFromHistory(index) {
            const item = consultHistory[index];
            window.location.href = item.url + '&q=' + encodeURIComponent(item.query);
        }

        function toggleHistory() {
            const sidebar = document.getElementById('historySidebar');
            const overlay = document.getElementById('overlay');
            const isOpen = sidebar.classList.contains('open');
            
            if (isOpen) {
                sidebar.classList.remove('open');
                overlay.classList.remove('show');
            } else {
                renderHistory();
                sidebar.classList.add('open');
                overlay.classList.add('show');
            }
        }

        const historyQuery = getQueryParam('q');
        if (historyQuery) { document.getElementById('dadoConsulta').value = historyQuery; }
    </script>
</body>
</html>
