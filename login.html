<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Klord Buscas V2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --cor-fundo: #0a0a0f;
            --cor-card: #12121a;
            --cor-borda: #2a2a3e;
            --cor-primaria: #7f00ff;
            --cor-secundaria: #a855f7;
            --cor-acento: #00d4ff;
            --cor-sucesso: #10b981;
            --cor-erro: #ef4444;
            --cor-texto: #f8fafc;
            --cor-texto-sec: #94a3b8;
            --gradient-primario: linear-gradient(135deg, #7f00ff 0%, #a855f7 100%);
            --gradient-secundario: linear-gradient(135deg, #00d4ff 0%, #7f00ff 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--cor-fundo);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Background Effects */
        .bg-effects {
            position: fixed;
            inset: 0;
            pointer-events: none;
        }

        .bg-effects::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 80%, rgba(127, 0, 255, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(0, 212, 255, 0.1) 0%, transparent 50%);
            animation: rotate 30s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }

        .login-card {
            background: rgba(18, 18, 26, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid var(--cor-borda);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .logo-section {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-icon {
            width: 80px;
            height: 80px;
            background: var(--gradient-primario);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 2.5rem;
            color: white;
            box-shadow: 0 10px 40px rgba(127, 0, 255, 0.4);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .logo-section h1 {
            font-size: 1.75rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: var(--gradient-primario);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-section p {
            color: var(--cor-texto-sec);
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--cor-texto-sec);
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--cor-texto-sec);
            transition: color 0.3s;
        }

        .form-group input {
            width: 100%;
            padding: 1rem 1rem 1rem 2.75rem;
            background: rgba(26, 26, 37, 0.8);
            border: 1px solid var(--cor-borda);
            border-radius: 12px;
            color: var(--cor-texto);
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--cor-primaria);
            box-shadow: 0 0 0 3px rgba(127, 0, 255, 0.1);
        }

        .form-group input:focus + i {
            color: var(--cor-primaria);
        }

        .btn-login {
            width: 100%;
            padding: 1rem;
            background: var(--gradient-primario);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 1rem;
        }

        .btn-login:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(127, 0, 255, 0.4);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .status-message {
            padding: 1rem;
            border-radius: 10px;
            margin-top: 1rem;
            font-size: 0.9rem;
            display: none;
            align-items: center;
            gap: 8px;
        }

        .status-message.show {
            display: flex;
        }

        .status-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--cor-erro);
            color: var(--cor-erro);
        }

        .status-success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--cor-sucesso);
            color: var(--cor-sucesso);
        }

        .status-loading {
            background: rgba(127, 0, 255, 0.1);
            border: 1px solid var(--cor-primaria);
            color: var(--cor-primaria);
        }

        .version-info {
            text-align: center;
            margin-top: 2rem;
            color: var(--cor-texto-sec);
            font-size: 0.8rem;
        }

        .features-list {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--cor-texto-sec);
        }

        .features-list span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .features-list i {
            color: var(--cor-primaria);
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 1.5rem;
            }
            
            .features-list {
                flex-direction: column;
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="bg-effects"></div>
    
    <div class="login-container">
        <div class="login-card">
            <div class="logo-section">
                <div class="logo-icon">
                    <i class="fas fa-shield-alt"></i>
                </div>
                <h1>Klord Buscas</h1>
                <p>Sistema de Consultas Avançadas V2.0</p>
            </div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="usuario">Usuário</label>
                    <div class="input-wrapper">
                        <input type="text" id="usuario" required placeholder="Digite seu usuário">
                        <i class="fas fa-user"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label for="senha">Senha</label>
                    <div class="input-wrapper">
                        <input type="password" id="senha" required placeholder="Digite sua senha">
                        <i class="fas fa-lock"></i>
                    </div>
                </div>

                <button type="submit" class="btn-login" id="btnLogin">
                    <i class="fas fa-sign-in-alt"></i>
                    Entrar no Sistema
                </button>
            </form>

            <div id="statusMessage" class="status-message"></div>

            <div class="features-list">
                <span><i class="fas fa-check"></i> 25+ APIs</span>
                <span><i class="fas fa-check"></i> Consultas em tempo real</span>
                <span><i class="fas fa-check"></i> Dados atualizados</span>
            </div>

            <div class="version-info">
                Klord Buscas V2.0 © 2025 - Todos os direitos reservados
            </div>
        </div>
    </div>

    <script>
        async function handleLogin(e) {
            e.preventDefault();
            
            const btn = document.getElementById('btnLogin');
            const status = document.getElementById('statusMessage');
            const usuario = document.getElementById('usuario').value;
            const senha = document.getElementById('senha').value;

            btn.disabled = true;
            status.className = 'status-message status-loading show';
            status.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Verificando credenciais...';

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usuario, senha })
                });

                const data = await response.json();

                if (response.ok && data.ok) {
                    status.className = 'status-message status-success show';
                    status.innerHTML = '<i class="fas fa-check-circle"></i> Login realizado! Redirecionando...';
                    
                    setTimeout(() => {
                        window.location.href = data.tipo === 'owner' || data.tipo === 'admin' ? '/admin/dashboard' : '/painel';
                    }, 1000);
                } else {
                    status.className = 'status-message status-error show';
                    status.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${data.erro || 'Erro no login'}`;
                    btn.disabled = false;
                }
            } catch (error) {
                status.className = 'status-message status-error show';
                status.innerHTML = '<i class="fas fa-exclamation-circle"></i> Erro de conexão com o servidor';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
