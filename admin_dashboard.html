<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Klord Buscas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Variáveis de Tema (Roxo Escuro e Gradientes) */
        :root {
            --cor-fundo: #0c0c14; 
            --cor-card-fundo: #1a1a2e; 
            --cor-borda: #3a3a5e; 
            --cor-primaria: #7f00ff; 
            --cor-secundaria-acao: #a259ff; 
            --cor-gradiente-btn: linear-gradient(135deg, #7f00ff 0%, #a259ff 100%);
            --cor-texto-principal: #e0e0e0;
            --cor-texto-secundaria: #9e9e9e;
            --cor-sucesso: #4caf50;
            --radius-borda: 16px;
            --shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--cor-fundo);
            color: var(--cor-texto-principal);
            margin: 0;
            padding: 30px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            color: var(--cor-secundaria-acao);
            margin-bottom: 25px;
            font-size: 2rem;
            border-bottom: 1px solid var(--cor-borda);
            padding-bottom: 15px;
        }
        
        /* Layout dos Cartões de Estatísticas */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--cor-card-fundo);
            padding: 25px;
            border-radius: var(--radius-borda);
            box-shadow: var(--shadow);
            border: 1px solid var(--cor-borda);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .stat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .stat-header h2 {
            font-size: 1.1rem;
            font-weight: 600;
            margin: 0;
            color: var(--cor-texto-principal);
        }

        .stat-icon {
            background: rgba(127, 0, 255, 0.15); 
            padding: 10px;
            border-radius: 8px;
            color: var(--cor-secundaria-acao);
            font-size: 1.5rem;
        }
        
        .stat-value {
            font-size: 3rem;
            font-weight: 700;
            color: var(--cor-secundaria-acao);
            margin-bottom: 5px;
        }

        .stat-footer {
            font-size: 0.9rem;
            color: var(--cor-texto-secundaria);
        }
        
        /* Cartão de Status do Sistema */
        .status-online {
            background-color: var(--cor-sucesso);
            color: white;
            padding: 5px 12px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.85rem;
            display: inline-block;
            margin-top: 10px;
        }

    </style>
</head>
<body>
    <div class="container">
        <h1>Painel de Administração</h1>
        
        <script>
             // Simulação do template Flask para incluir o menu no snippet
             fetch('/admin_menu.html')
                 .then(response => response.text())
                 .then(html => {
                     document.querySelector('.container').insertAdjacentHTML('afterbegin', html.replace('{% if active_page == \'dashboard\' %}active{% endif %}', 'active').replace('{% if active_page == \'users\' %}active{% endif %}', ''));
                 })
                 .catch(err => console.error('Erro ao carregar menu:', err));
        </script>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-header">
                    <h2>Usuários Ativos</h2>
                    <div class="stat-icon"><i class="fas fa-users"></i></div>
                </div>
                <div class="stat-value">3</div>
                <div class="stat-footer">Total de usuários cadastrados</div>
            </div>

            <div class="stat-card">
                <div class="stat-header">
                    <h2>Módulos Ativos</h2>
                    <div class="stat-icon"><i class="fas fa-th-large"></i></div>
                </div>
                <div class="stat-value">12</div>
                <div class="stat-footer">Módulos disponíveis no sistema</div>
            </div>

            <div class="stat-card">
                <div class="stat-header">
                    <h2>Consultas Hoje</h2>
                    <div class="stat-icon"><i class="fas fa-calendar-day"></i></div>
                </div>
                <div class="stat-value">0</div>
                <div class="stat-footer">Consultas realizadas hoje</div>
            </div>
            
            <div class="stat-card">
                <div class="stat-header">
                    <h2>Status do Sistema</h2>
                    <div class="stat-icon"><i class="fas fa-check-circle"></i></div>
                </div>
                <span class="status-online">Online</span>
                <div class="stat-footer" style="margin-top: 5px;">Sistema operacional</div>
            </div>
        </div>
        
        </div>
</body>
</html>
